<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="admin/layout :: layout(~{::section})">

<section>

    <div class="row">
        <div class="col-md-12">
            <div class="ec-dashboard-banner">
                <h1>Xin chào Quản Trị Viên! 👋</h1>
                <p>Chào mừng bạn trở lại hệ thống quản lý Trung Tâm Tiếng Anh. Chúc bạn một ngày làm việc hiệu quả.</p>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4" style="margin-bottom: 20px;">
            <div class="ec-stat-card ec-stat-card-primary">
                <div class="ec-stat-icon ec-stat-icon-primary">
                    <i class="fa fa-building"></i>
                </div>
                <div class="ec-stat-info">
                    <h4>Quản lý lớp học</h4>
                    <a href="/admin/lophoc"><i class="fa fa-arrow-right" style="margin-right: 4px;"></i> Truy cập ngay</a>
                </div>
            </div>
        </div>
        <div class="col-md-4" style="margin-bottom: 20px;">
            <div class="ec-stat-card ec-stat-card-secondary">
                <div class="ec-stat-icon ec-stat-icon-secondary">
                    <i class="fa fa-users"></i>
                </div>
                <div class="ec-stat-info">
                    <h4>Quản lý giáo viên</h4>
                    <a href="/admin/teacher" style="color: var(--ec-secondary);"><i class="fa fa-arrow-right" style="margin-right: 4px;"></i> Truy cập ngay</a>
                </div>
            </div>
        </div>
        <div class="col-md-4" style="margin-bottom: 20px;">
            <div class="ec-stat-card ec-stat-card-accent">
                <div class="ec-stat-icon ec-stat-icon-accent">
                    <i class="fa fa-check-square-o"></i>
                </div>
                <div class="ec-stat-info">
                    <h4>Duyệt đăng ký</h4>
                    <a href="/admin/dangky" style="color: var(--ec-accent);"><i class="fa fa-arrow-right" style="margin-right: 4px;"></i> Truy cập ngay</a>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12" style="margin-bottom: 20px;">
            <div class="ec-stat-card" style="border-left: 4px solid #10B981; background: linear-gradient(135deg, rgba(16,185,129,0.03), rgba(6,182,212,0.03));">
                <div class="ec-stat-icon" style="background: linear-gradient(135deg, #10B981, #059669); color: #fff; box-shadow: 0 4px 14px rgba(16,185,129,0.35);">
                    <i class="fa fa-user-circle"></i>
                </div>
                <div class="ec-stat-info">
                    <h4 style="color: #065f46; font-weight: 800;">Hồ sơ cá nhân &amp; Nhật ký Hoạt Động</h4>
                    <a href="/admin/profile" style="color: #10B981; font-weight: 700; font-size: 15px;">
                        <i class="fa fa-arrow-right" style="margin-right: 4px;"></i> Xem Log Hệ thống
                    </a>
                </div>
                <div style="margin-left: auto; padding-right: 20px;">
                    <a href="/admin/profile" class="btn" style="background: linear-gradient(135deg,#10B981,#059669); color: white; border-radius: 12px; padding: 10px 20px; font-weight: 700; border: none; box-shadow: 0 4px 12px rgba(16,185,129,0.3);">
                        <i class="fa fa-history"></i> Mở Hồ sơ
                    </a>
                </div>
            </div>
        </div>
    </div>

</section>

</html>
