<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Học Viên - EngCenter</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/font-awesome.min.css}">
    <link rel="stylesheet" th:href="@{/css/engcenter-design.css}">
</head>

<body class="ec-body" id="top" data-spy="scroll" data-target=".navbar-collapse" data-offset="50">

    <!-- NAVBAR -->
    <section class="navbar ec-navbar navbar-fixed-top" role="navigation">
        <div class="container">
            <div class="navbar-header">
                <button class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse">
                    <span class="icon icon-bar"></span>
                    <span class="icon icon-bar"></span>
                    <span class="icon icon-bar"></span>
                </button>
                <a href="/student/home" class="navbar-brand">
                    <span class="ec-brand-icon" style="background: linear-gradient(135deg, var(--ec-secondary), var(--ec-primary));"><i class="fa fa-graduation-cap"></i></span>
                    <span class="ec-brand-accent">Student Portal</span>
                </a>
            </div>
            <div class="collapse navbar-collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li class="ec-nav-logout">
                        <a href="/logout"><i class="fa fa-sign-out"></i> Đăng xuất</a>
                    </li>
                </ul>
            </div>
        </div>
    </section>

    <div class="container ec-main-content">
        <div class="row">
            <div class="col-md-10 col-md-offset-1">
                <div class="ec-welcome-panel ec-animate-fadeInUp">
                    <div style="width: 80px; height: 80px; border-radius: 20px; background: var(--ec-gradient-primary); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 32px; color: #fff;">
                        <i class="fa fa-hand-peace-o"></i>
                    </div>
                    <h2>Chào Mừng Học Viên!</h2>
                    <p class="ec-welcome-subtitle">Hệ thống quản lý học tập dành riêng cho bạn.</p>

                    <div class="row" style="margin-top: 10px;">
                        <div class="col-md-6" style="margin-bottom: 16px;">
                            <a href="/student/classes" class="ec-action-card">
                                <div class="ec-action-icon ec-stat-icon-primary">
                                    <i class="fa fa-list-ul"></i>
                                </div>
                                <h4>Danh sách lớp học</h4>
                                <p>Xem các lớp học đang mở và đăng ký tham gia</p>
                            </a>
                        </div>
                        <div class="col-md-6" style="margin-bottom: 16px;">
                            <a href="/student/my-classes" class="ec-action-card">
                                <div class="ec-action-icon ec-stat-icon-success">
                                    <i class="fa fa-book"></i>
                                </div>
                                <h4>Lớp của tôi</h4>
                                <p>Xem các lớp đã đăng ký và kết quả học tập</p>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/jquery.js}"></script>
    <script th:src="@{/js/bootstrap.min.js}"></script>

</body>

</html>
