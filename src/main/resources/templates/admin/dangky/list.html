<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="admin/layout :: layout(~{::section})">

<section>
    <style>
        .panel-custom {
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header-section h3 {
            font-weight: 800;
            color: #1e293b;
            margin: 0;
            background: linear-gradient(135deg, #29ca8e, #06B6D4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .table-container {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .table {
            margin-bottom: 0;
        }

        .table > thead > tr > th {
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.05em;
            padding: 16px;
        }

        .table > tbody > tr > td {
            padding: 16px;
            vertical-align: middle;
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
        }

        .btn-custom-success {
            background: linear-gradient(135deg, #29ca8e, #23ba81);
            color: #fff;
            border-radius: 10px;
            padding: 10px 20px;
            border: none;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(41, 202, 142, 0.2);
        }

        .btn-custom-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(41, 202, 142, 0.3);
            color: #fff;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .status-wait {
            background: #fef3c7;
            color: #92400e;
        }

        .status-approved {
            background: #dcfce7;
            color: #166534;
        }

        .action-links {
            margin-top: 30px;
            text-align: center;
        }

        .action-links a {
            color: #64748b;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s;
        }

        .action-links a:hover {
            color: #29ca8e;
        }

        .student-item {
            display: flex;
            align-items: center;
        }

        .student-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            color: #64748b;
            font-weight: bold;
        }
    </style>

    <div class="panel-custom animate__animated animate__fadeIn">
        <div class="header-section">
            <h3>Danh sách đăng ký</h3>
            <div style="display:flex; gap:10px; align-items:center;">
                <a href="/admin/dangky/duyet-tat-ca" class="btn btn-custom-success"
                   onclick="return confirm('Duyệt TẤT CẢ đơn đang chờ? Hành động này không thể hoàn tác!')">
                    <i class="fa fa-check-double"></i> Duyệt tất cả
                </a>
                <a href="/admin/dangky/add" class="btn btn-custom-success" style="background:linear-gradient(135deg,#4F46E5,#06B6D4);">
                    <i class="fa fa-plus"></i> Thêm đăng ký mới
                </a>
            </div>
        </div>

        <div class="table-container">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Học viên</th>
                            <th>Lớp học</th>
                            <th>Ngày đăng ký</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="dk : ${list}">
                            <td>
                                <div class="student-item">
                                    <div class="student-avatar" th:text="${#strings.substring(dk.student.username, 0, 1).toUpperCase()}"></div>
                                    <div>
                                        <div style="font-weight: 700;" th:text="${dk.student.username}"></div>
                                        <small class="text-muted" th:text="${dk.student.role}"></small>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <div style="font-weight: 600;" th:text="${dk.lopHoc != null ? dk.lopHoc.tenLop : 'Không rõ lớp'}"></div>
                                <small class="text-muted" th:text="${dk.lopHoc != null and dk.lopHoc.giaoVien != null ? dk.lopHoc.giaoVien.ten : 'Chưa phân công'}"></small>
                            </td>
                            <td th:text="${#temporals.format(dk.ngayDangKy, 'dd/MM/yyyy')}"></td>
                            <td>
                                <span th:if="${dk.trangThai == 'CHO_DUYET'}" class="status-badge status-wait">
                                    <i class="fa fa-clock-o" style="margin-right: 4px;"></i> Chờ duyệt
                                </span>
                                <span th:if="${dk.trangThai != 'CHO_DUYET'}" class="status-badge status-approved">
                                    <i class="fa fa-check-circle" style="margin-right: 4px;"></i> Đã duyệt
                                </span>
                            </td>
                            <td>
                                <a th:if="${dk.trangThai == 'CHO_DUYET'}" th:href="@{/admin/dangky/duyet/{id}(id=${dk.id})}"
                                    class="btn btn-custom-success btn-sm">
                                    <i class="fa fa-check"></i> Duyệt ngay
                                </a>
                                <span th:if="${dk.trangThai != 'CHO_DUYET'}" class="text-muted small italic">
                                    Đã xử lý
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="action-links">
            <a href="/admin/home"><i class="fa fa-arrow-left"></i> Quay lại Dashboard</a>
        </div>
    </div>

    <!-- Toast thông báo duyệt thành công -->
    <div id="toastDuyetAll" style="display:none; position:fixed; bottom:30px; right:30px; background:#10B981; color:white; padding:16px 24px; border-radius:14px; box-shadow:0 8px 24px rgba(16,185,129,.35); z-index:9999; font-weight:700; font-size:14px; animation:slideIn .4s ease;">
        <i class="fa fa-check-circle"></i> <span id="toastDuyetMsg"></span>
    </div>

    <style>
        @keyframes slideIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    </style>

    <script>
        (function(){
            const params = new URLSearchParams(window.location.search);
            if (params.has('duyetAll')) {
                const count = params.get('duyetAll');
                const toast = document.getElementById('toastDuyetAll');
                document.getElementById('toastDuyetMsg').textContent = 'Đã duyệt ' + count + ' đơn đăng ký thành công!';
                toast.style.display = 'block';
                setTimeout(() => toast.style.opacity = '0', 4000);
                setTimeout(() => toast.style.display = 'none', 4500);
            }
        })();
    </script>

</section>

</html>
