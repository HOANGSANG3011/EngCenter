<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="admin/layout :: layout(~{::section})">

<section>

    <div class="panel-custom">

        <h3>Thêm lịch giảng dạy</h3>

        <form action="/admin/schedule/save" method="post">

            <!-- Giáo viên -->
            <div class="form-group">
                <label>Giáo viên</label>
                <select name="teacherId" class="form-control" required>
                    <option th:each="t : ${teachers}"
                            th:value="${t.id}"
                            th:text="${t.ten}">
                    </option>
                </select>
            </div>

            <!-- Thứ -->
            <div class="form-group">
                <label>Thứ</label>
                <select name="thu" class="form-control">
                    <option th:each="d : ${days}" th:value="${d}" th:text="${d}"></option>
                </select>
            </div>

            <!-- Ngày -->
            <div class="form-group">
                <label>Ngày</label>
                <input type="date" name="ngay" class="form-control" required>
            </div>

            <!-- Môn -->
            <div class="form-group">
                <label>Môn học</label>
                <input type="text" name="monHoc" class="form-control" required>
            </div>

            <!-- Buổi -->
            <div class="form-group">
                <label>Buổi</label>
                <select name="buoi" id="buoi" class="form-control">
                    <option value="SANG">Sáng</option>
                    <option value="CHIEU">Chiều</option>
                    <option value="TOI">Tối</option>
                </select>
            </div>

            <!-- Tiết -->
            <div class="row">
                <div class="col-md-6">
                    <input type="number" name="tietBatDau" id="start" class="form-control" placeholder="Từ tiết">
                </div>
                <div class="col-md-6">
                    <input type="number" name="tietKetThuc" id="end" class="form-control" placeholder="Đến tiết">
                </div>
            </div>

            <br>

            <button class="btn btn-success">
                <i class="fa fa-save"></i> Lưu lịch
            </button>

        </form>

    </div>

    <script>
        const buoi = document.getElementById("buoi");
        const start = document.getElementById("start");
        const end = document.getElementById("end");

        buoi.addEventListener("change", () => {
            if (buoi.value === "SANG") {
                start.value = 1; end.value = 3;
            } else if (buoi.value === "CHIEU") {
                start.value = 7; end.value = 9;
            } else {
                start.value = 13; end.value = 15;
            }
        });
    </script>

</section>
</html>
