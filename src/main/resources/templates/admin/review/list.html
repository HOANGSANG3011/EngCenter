<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="admin/layout :: layout(~{::section})">

<section>

    <style>
        .teacher-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }
    
        .teacher-card {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); /* Modern soft shadow */
            border: 1px solid #eef2f7;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
    
        .teacher-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(79, 70, 229, 0.1);
            border-color: var(--ec-primary-light);
            background: #fbfbff;
        }
    
        .class-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 4px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.4s;
        }
    
        .teacher-card:hover .class-image {
            transform: scale(1.1);
        }
    
        .class-name {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 5px;
            color: var(--ec-text);
        }
    
        .teacher-info {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
            margin-bottom: 15px;
        }
    
        .teacher-info i {
            color: var(--ec-primary);
            margin-right: 5px;
        }
    
        .teacher-subject {
            font-size: 13px;
            background: var(--ec-primary-50);
            color: var(--ec-primary);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
            font-weight: 600;
        }
    
        .rating-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            color: #F59E0B;
        }
    
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
    
        .main-title {
            font-size: 32px;
            font-weight: 900;
            color: #1e293b;
            background: linear-gradient(45deg, #4f46e5, #9333ea);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
    
    <div class="header-section">
        <h1 class="main-title">Đánh giá Lớp học & Giáo viên</h1>
        <div style="color: #64748b; font-weight: 500;">Chọn lớp học để xem phản hồi của học sinh</div>
    </div>
    
    <div class="teacher-grid">
        <a th:each="c : ${classes}" th:href="@{/admin/review/{id}(id=${c.id})}" class="teacher-card">
            
            <img class="class-image" th:src="${c.hinhAnh != null && !c.hinhAnh.isEmpty() ? '/images/' + c.hinhAnh : 'https://cdn-icons-png.flaticon.com/512/194/194931.png'}" />
            
            <div class="class-name" th:text="${c.tenLop}"></div>
            <div class="teacher-info">
                <i class="fa fa-user"></i> <span th:text="${c.giaoVien != null ? c.giaoVien.ten : 'Chưa có giáo viên'}"></span>
            </div>
            <div class="teacher-subject" th:text="${c.giaoVien != null ? c.giaoVien.mucDo : 'Chưa có'}"></div>
            
            <div class="rating-box">
                <i class="fa fa-star"></i>
                <i class="fa fa-star"></i>
                <i class="fa fa-star"></i>
                <i class="fa fa-star"></i>
                <i class="fa fa-star-half-o"></i>
                <span style="color: #64748b; font-size: 13px; margin-left: 5px;">Xem (5)</span>
            </div>
        </a>
    </div>

</section>

</html>
