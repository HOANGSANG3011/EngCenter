<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thanh Toán QR | Mobile App</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body {
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .mobile-container {
            width: 100%;
            max-width: 480px;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .header {
            background: #4F46E5;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
        }
        .content {
            padding: 30px 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .merchant-info {
            text-align: center;
            margin-bottom: 30px;
        }
        .merchant-avatar {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #06B6D4, #4F46E5);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 15px auto;
        }
        .amount {
            font-size: 32px;
            font-weight: 700;
            color: #111827;
            text-align: center;
            margin-bottom: 30px;
        }
        .details-card {
            background: #f9fafb;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .detail-row:last-child {
            margin-bottom: 0;
        }
        .detail-label {
            color: #6b7280;
        }
        .detail-value {
            font-weight: 600;
            color: #1f2937;
            text-align: right;
        }
        .btn-pay {
            background: #10B981;
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            margin-top: auto;
            transition: background 0.2s;
        }
        .btn-pay:hover {
            background: #059669;
        }
        .success-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #10B981;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 20px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="mobile-container">
    <div class="header">
        Xác nhận thanh toán
    </div>
    
    <div class="content">
        <!-- Khi thành công -->
        <div th:if="${param.success}" class="success-overlay">
            <div class="success-icon">
                <i class="fa fa-check"></i>
            </div>
            <h2 style="color: #111827; font-weight: 700; margin-bottom: 10px;">Thanh toán thành công!</h2>
            <p style="color: #6b7280;">Hóa đơn đã được gửi qua ứng dụng của bạn.</p>
            <p style="color: #6b7280; font-size: 14px;">Bạn có thể đóng trang này và kiểm tra trên máy tính.</p>
        </div>

        <!-- Khi chờ xác nhận -->
        <div th:if="${param.success == null}">
            <div class="merchant-info">
                <div class="merchant-avatar">
                    <i class="fa fa-graduation-cap"></i>
                </div>
                <h3 style="margin:0; font-weight:700; color:#1f2937;">Trung Tâm Anh Ngữ EngCenter</h3>
            </div>

            <div class="amount" th:text="${#numbers.formatDecimal(dk.hocPhi, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></div>

            <div class="details-card">
                <div class="detail-row">
                    <span class="detail-label">Mã học phí</span>
                    <span class="detail-value" th:text="'HP' + ${dk.id}"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Lớp học</span>
                    <span class="detail-value" th:text="${dk.lopHoc.tenLop}"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Họ tên HV</span>
                    <span class="detail-value" th:text="${dk.student.ten}"></span>
                </div>
                <div style="border-top: 1px dashed #e5e7eb; margin: 15px 0;"></div>
                <div class="detail-row">
                    <span class="detail-label">Từ tài khoản</span>
                    <span class="detail-value">***4567</span>
                </div>
            </div>

            <form th:action="@{/student/mobile-checkout/{id}(id=${dk.id})}" method="post" style="margin-top:auto;">
                <button type="submit" class="btn-pay">
                    <i class="fa fa-fingerprint" style="margin-right:8px;"></i> Xác thực Thanh Toán
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
